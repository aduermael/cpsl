name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: ${{ matrix.rule }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rule: [file-length, docstring, positional-params]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build ci-check
        run: cd tools/ci-check && go build -o "$RUNNER_TEMP/ci-check" .

      - name: Run ${{ matrix.rule }}
        run: "$RUNNER_TEMP/ci-check" ${{ matrix.rule }} .
