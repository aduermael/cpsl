name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  file-length:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: cd tools/ci-check && go build -o "$RUNNER_TEMP/ci-check" .
      - run: '"$RUNNER_TEMP/ci-check" file-length .'

  docstring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: cd tools/ci-check && go build -o "$RUNNER_TEMP/ci-check" .
      - run: '"$RUNNER_TEMP/ci-check" docstring .'

  positional-params:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: cd tools/ci-check && go build -o "$RUNNER_TEMP/ci-check" .
      - run: '"$RUNNER_TEMP/ci-check" positional-params .'
