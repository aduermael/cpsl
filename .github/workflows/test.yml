name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Run tests (root module)
        run: go test ./...

      - name: Run tests (tools modules)
        run: |
          for mod in tools/*/go.mod; do
            dir=$(dirname "$mod")
            echo "::group::$dir"
            (cd "$dir" && go test ./...)
            echo "::endgroup::"
          done
